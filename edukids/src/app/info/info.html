<section id="actividades">
    <div class="main-container">
        <h2 class="title">Actividades</h2>
        <p class="instruccion-clic">
            <i class="bi bi-hand-index-thumb"></i> Haz clic en la actividad para ver más detalles y fotos
        </p>
        <div class="actividades-container">
            @for ( actividad of listaActividades; track actividad.nombre ) {
                <app-activity [activity]="actividad" class="actividad"></app-activity>
            }
        </div> 

    </div>


</section>
